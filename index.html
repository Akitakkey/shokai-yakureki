<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>初回薬歴作成支援</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<meta name="theme-color" content="#f2f2f7">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f2f7;--card:#ffffff;--blue:#007aff;--blue-bg:rgba(0,122,255,.07);
  --green:#34c759;--red:#ff3b30;--orange:#ff9500;--yellow:#ffcc00;
  --p1:#1c1c1e;--p2:#636366;--p3:#c7c7cc;
  --sep:rgba(60,60,67,.12);--fill:#f2f2f7;--inset:#e5e5ea;
  --r:14px;--rsm:10px;
  --shadow-xs:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 8px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:0 16px 48px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  background:var(--bg);color:var(--p1);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;}

/* Navbar */
.nav{background:rgba(248,248,252,.88);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(60,60,67,.08);min-height:56px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:6px;}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(118,118,128,.12);
  color:var(--p1);font-size:16px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .2s,transform .15s;}
.icon-btn:hover{background:rgba(118,118,128,.2);}
.icon-btn:active{transform:scale(.94);}

.content{max-width:1400px;margin:0 auto;padding:16px 12px calc(100px + env(safe-area-inset-bottom));}

/* Card */
.card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:16px;
  box-shadow:var(--shadow-xs);}
.sec-label{font-size:11px;font-weight:600;color:var(--p2);text-transform:uppercase;
  letter-spacing:.6px;padding:0 4px 10px;display:block;}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--rsm);border:none;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);font-family:inherit;letter-spacing:-.1px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--blue);color:#fff;
  box-shadow:0 1px 4px rgba(0,122,255,.3),0 1px 2px rgba(0,122,255,.2);}
.btn-primary:hover{background:#0070eb;}
.btn-primary:disabled{background:var(--p3);box-shadow:none;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(118,118,128,.12);color:var(--p1);}
.btn-secondary:hover{background:rgba(118,118,128,.18);}
.btn-ghost{background:transparent;color:var(--blue);padding:6px 10px;font-weight:500;}
.btn-ghost:hover{background:var(--blue-bg);}
.btn-danger{background:transparent;color:var(--red);padding:6px 10px;}
.btn-danger:hover{background:rgba(255,59,48,.08);}
.btn-sm{padding:5px 12px;font-size:13px;}
.btn-full{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:var(--r);}
.btn-primary:disabled,.btn-secondary:disabled{opacity:.5;cursor:not-allowed;}
.export-bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.export-bar .btn-primary{flex:2 1 240px;padding:14px;font-size:15px;font-weight:600;border-radius:var(--r);}
.export-bar .btn-secondary{flex:1 1 160px;padding:14px;font-size:15px;font-weight:600;border-radius:var(--r);}

/* Form */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:500;color:var(--p2);margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;letter-spacing:.1px;}
textarea,input[type=text],input[type=password]{
  width:100%;padding:10px 13px;border:1px solid var(--sep);border-radius:var(--rsm);
  font-size:14px;font-family:inherit;color:var(--p1);background:var(--card);
  resize:vertical;line-height:1.6;outline:none;
  transition:border-color .18s,box-shadow .18s;box-shadow:var(--shadow-xs);}
textarea:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 3.5px rgba(0,122,255,.14),var(--shadow-xs);}

/* Dropzone */
.dropzone{border:2px dashed var(--inset);border-radius:var(--r);padding:28px 16px;
  text-align:center;color:var(--p2);cursor:pointer;transition:all .22s;}
.dropzone:hover,.dropzone.over{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.dz-icon{font-size:28px;margin-bottom:6px;}
.dz-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.dz-sub{font-size:11px;color:var(--p3);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:20px;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:560px;
  max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-hd{padding:20px 20px 15px;border-bottom:1px solid var(--sep);
  display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.modal-body{padding:20px;}
.modal-ft{padding:15px 20px;border-top:1px solid var(--sep);
  display:flex;gap:8px;justify-content:flex-end;}

/* Toast */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(4px);
  background:rgba(28,28,30,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  box-shadow:var(--shadow-md);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Spinner */
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:spin .55s linear infinite;}
.spin-blue{border:2px solid rgba(0,122,255,.2);border-top-color:var(--blue);}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error / Alert */
.err{background:rgba(255,59,48,.07);border:1px solid rgba(255,59,48,.2);color:#c0392b;
  padding:11px 14px;border-radius:var(--rsm);font-size:13px;margin-bottom:12px;line-height:1.5;}
.alert-yellow{background:#fffbea;border:1px solid #f0c040;color:#7a5c00;
  padding:14px 16px;border-radius:var(--r);margin-bottom:16px;box-shadow:var(--shadow-xs);}
.alert-yellow-title{font-weight:700;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.alert-yellow ul{padding-left:20px;line-height:1.8;font-size:13px;}
.alert-orange{background:#fff4e5;border:1px solid var(--orange);color:#95610a;
  padding:12px 16px;border-radius:var(--r);margin-bottom:16px;font-size:13px;
  display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:var(--shadow-xs);}

/* Utils */
.flex-bc{display:flex;justify-content:space-between;align-items:center;}
.flex-c{display:flex;align-items:center;}
.gap-8{gap:8px;}
.mt-8{margin-top:8px;}
.mt-12{margin-top:12px;}
.text-sm{font-size:13px;}
.text-xs{font-size:12px;}
.text-p2{color:var(--p2);}
.w100{width:100%;}

/* Checkbox */
.chk{position:relative;width:26px;height:26px;flex-shrink:0;cursor:pointer;}
.chk input{display:none;}
.chk-box{position:absolute;inset:0;border:2px solid var(--inset);border-radius:6px;background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;
  transition:border-color .15s;}
.chk input:checked+.chk-box{border-color:var(--green);}

/* Badges */
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.1px;}
.badge-req{background:rgba(255,149,0,.15);color:#95610a;}
.badge-warn{background:rgba(255,59,48,.12);color:#c0392b;}

/* ===== Layout: 3 zones ===== */
.main-layout{display:flex;gap:16px;align-items:flex-start;}
.source-pane{flex:0 0 38%;min-width:0;position:sticky;top:70px;max-height:calc(100vh - 90px);
  overflow-y:auto;transition:flex-basis .2s;}
.source-pane.collapsed{flex:0 0 44px;}
.preview-pane{flex:1;min-width:0;}

.source-collapsed-bar{writing-mode:vertical-rl;background:var(--card);border-radius:var(--r);
  padding:16px 8px;box-shadow:var(--shadow-xs);cursor:pointer;text-align:center;font-size:13px;
  font-weight:600;color:var(--p2);height:200px;display:flex;align-items:center;justify-content:center;}

.source-header{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 10px;}
.file-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.file-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--sep);background:var(--card);
  color:var(--p1);font-size:12px;cursor:pointer;font-weight:500;max-width:140px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.file-tab.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
.file-tab .rm{opacity:.7;font-weight:700;}
.file-tab .rm:hover{opacity:1;}

.viewer-box{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-xs);
  padding:12px;text-align:center;min-height:200px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.viewer-box img{max-width:100%;max-height:70vh;border-radius:8px;}
.viewer-box canvas{max-width:100%;height:auto;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.12);}
.pdf-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:10px;}

/* Preview blocks */
.block-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-xs);
  padding:14px 16px;margin-bottom:14px;}
.block-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.block-title{font-size:14px;font-weight:700;color:var(--p1);}
.block-note{font-size:11px;color:var(--p3);margin-top:4px;}
.block-fixnote{font-size:11px;color:var(--orange);margin-top:6px;background:rgba(255,149,0,.08);
  padding:5px 9px;border-radius:8px;display:inline-block;}
.block-manual-badge{font-size:10px;color:var(--blue);background:var(--blue-bg);
  padding:2px 8px;border-radius:10px;font-weight:600;}

/* OP problem cards */
.op-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-xs);
  margin-bottom:12px;overflow:hidden;transition:opacity .2s;}
.op-card.off{opacity:.5;background:var(--fill);}
.op-card-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--sep);}
.op-card-title{flex:1;font-size:13px;font-weight:700;color:var(--p1);}
.op-card-body{padding:10px 14px;}
.op-card-body textarea{font-size:13px;line-height:1.8;min-height:80px;}

/* Copy bar */
.copy-bar{position:fixed;bottom:0;left:0;right:0;
  background:rgba(248,248,252,.94);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid rgba(60,60,67,.08);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;z-index:60;}
.excluded-note{font-size:11px;color:var(--orange);font-weight:600;margin-left:6px;}

/* Knowledge suggestion card (non-modal) */
.ks-card{background:#eef7ff;border:1px solid #a9d4ff;border-radius:var(--r);
  padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow-xs);}
.ks-card-title{font-size:12px;font-weight:700;color:#0058b0;margin-bottom:8px;}
.ks-item{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;}
.ks-item-actions{display:flex;gap:8px;margin-top:8px;}

/* Knowledge manager list */
.kd-item{border:1px solid var(--sep);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.kd-item-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.kd-tag{font-size:11px;color:var(--blue);font-weight:700;}
.kd-drug{font-size:11px;color:var(--p2);}

/* Mobile tabs */
.mobile-tabs{display:none;gap:8px;margin-bottom:12px;}
.mobile-tab-btn{flex:1;padding:9px;border-radius:var(--rsm);border:1.5px solid var(--sep);
  background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--p2);}
.mobile-tab-btn.sel{background:var(--blue);color:#fff;border-color:var(--blue);}

.loading-inline{display:flex;align-items:center;gap:10px;justify-content:center;
  padding:20px;color:var(--blue);font-size:14px;font-weight:500;}

@media (max-width:820px){
  .main-layout{flex-direction:column;}
  .source-pane{position:static;max-height:none;flex-basis:auto !important;width:100%;}
  .source-pane.collapsed .source-body{display:none;}
  .source-collapsed-bar{display:none;}
  .mobile-tabs{display:flex;}
  .main-layout.tab-source .preview-pane{display:none;}
  .main-layout.tab-preview .source-pane{display:none;}
}

/* ══════════════════════════════════════════════════════════════
   個人情報マスキング機能（mask-phase）
   ══════════════════════════════════════════════════════════════ */
.mask-phase .dropzone{border:2px dashed var(--inset);border-radius:var(--r);padding:32px 20px;
  text-align:center;color:var(--p2);cursor:pointer;transition:all .22s;}
.mask-phase .dropzone:hover,.mask-phase .dropzone.over{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.mask-phase .dz-icon{font-size:30px;margin-bottom:8px;}
.mask-phase .dz-title{font-size:14px;font-weight:600;margin-bottom:4px;letter-spacing:-.2px;}
.mask-phase .dz-sub{font-size:12px;color:var(--p3);}

.mask-phase .file-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.mask-phase .file-tab{padding:5px 6px 5px 12px;border-radius:20px;border:1.5px solid var(--sep);background:var(--card);
  color:var(--p1);font-size:12px;cursor:pointer;font-weight:500;max-width:220px;
  display:flex;align-items:center;gap:4px;}
.mask-phase .file-tab .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.mask-phase .file-tab.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
.mask-phase .file-tab .rm{flex-shrink:0;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;opacity:.65;font-weight:700;font-size:11px;transition:all .15s;}
.mask-phase .file-tab .rm:hover{opacity:1;background:rgba(255,59,48,.15);color:var(--red);}
.mask-phase .file-tab.sel .rm:hover{background:rgba(255,255,255,.3);color:#fff;}

/* マスク編集キャンバス */
.mask-canvas-wrap{position:relative;display:inline-block;max-width:100%;user-select:none;line-height:0;}
.mask-canvas-wrap canvas{display:block;max-width:100%;height:auto;border-radius:8px;
  box-shadow:0 1px 6px rgba(0,0,0,.12);}
.mask-overlay{position:absolute;inset:0;cursor:crosshair;}
.mask-rect{position:absolute;background:rgba(10,10,12,.88);border:2px solid rgba(255,59,48,.9);
  cursor:move;box-sizing:border-box;}
.mask-rect.disabled{background:rgba(255,149,0,.08);border-style:dashed;border-color:rgba(255,149,0,.8);}
.rect-label{position:absolute;top:-20px;left:-2px;font-size:10px;font-weight:600;
  background:rgba(28,28,30,.9);color:#fff;padding:2px 7px;border-radius:5px;white-space:nowrap;
  pointer-events:none;}
.rect-close{position:absolute;top:-11px;right:-11px;width:20px;height:20px;border-radius:50%;
  background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;
  justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.rect-handle{position:absolute;width:12px;height:12px;background:#fff;border:2px solid rgba(255,59,48,.9);
  border-radius:50%;right:-7px;bottom:-7px;cursor:nwse-resize;}
.draft-rect{position:absolute;background:rgba(0,122,255,.18);border:2px dashed var(--blue);
  pointer-events:none;box-sizing:border-box;}
.debug-word-box{position:absolute;border:1px solid rgba(0,122,255,.55);pointer-events:none;
  box-sizing:border-box;}
.detect-bar{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.debug-toggle-row{display:flex;align-items:center;gap:8px;margin-top:12px;justify-content:center;}

/* ページごとのカード（スクロールして複数ページを見る構成） */
.page-card{border:1.5px solid var(--sep);border-radius:var(--r);padding:14px;margin-bottom:20px;text-align:center;}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;text-align:left;}
.page-card .card{margin-top:14px;text-align:left;}

/* 手書き/矩形モード切替 */
.mask-editor{display:flex;flex-direction:column;align-items:center;gap:10px;}
.tool-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;}
.seg{display:flex;border-radius:10px;background:var(--fill);padding:3px;gap:2px;}
.seg-btn{padding:6px 14px;border:none;background:transparent;border-radius:8px;font-size:13px;
  font-weight:500;color:var(--p2);cursor:pointer;transition:all .18s;font-family:inherit;}
.seg-btn.active{background:var(--card);color:var(--p1);box-shadow:var(--shadow-xs);}
.pen-width{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--p2);}
.pen-width input[type=range]{width:110px;accent-color:var(--blue);}
.pen-preview{width:32px;height:32px;border-radius:50%;background:var(--fill);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.pen-dot{border-radius:50%;background:#000;display:block;}
.stroke-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.stroke-close{position:absolute;width:20px;height:20px;border-radius:50%;
  background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;
  justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.3);
  transform:translate(-50%,-50%);z-index:5;}

/* Progress */
.prog-wrap{background:var(--card);border-radius:var(--r);padding:16px 18px;
  margin-bottom:16px;box-shadow:var(--shadow-xs);}
.prog-text{display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:var(--p2);margin-bottom:12px;}
.prog-text strong{color:var(--p1);font-weight:600;}
.prog-bar{height:5px;background:var(--inset);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#34aadc);
  border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}

.confirm-bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}

.notice{background:rgba(0,122,255,.06);border:1px solid rgba(0,122,255,.18);color:#0064d3;
  padding:10px 14px;border-radius:var(--rsm);font-size:12px;margin-bottom:16px;line-height:1.5;}
.empty{text-align:center;padding:48px 20px;color:var(--p2);}
.empty-icon{font-size:38px;margin-bottom:12px;}

/* トグルスイッチ */
.sw{position:relative;width:44px;height:26px;flex-shrink:0;}
.sw input{display:none;}
.sw-track{position:absolute;inset:0;background:var(--inset);border-radius:13px;
  cursor:pointer;transition:background .22s cubic-bezier(.4,0,.2,1);}
.sw input:checked+.sw-track{background:var(--green);}
.sw-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;
  background:#fff;border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.18),0 1px 2px rgba(0,0,0,.12);
  transition:transform .22s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.sw input:checked~.sw-thumb{transform:translateX(18px);}

.badge-done{background:rgba(52,199,89,.15);color:#248a3d;}
.badge-manual{background:rgba(0,122,255,.12);color:#0064d3;}

.p-row{padding:14px 16px;border-bottom:1px solid var(--sep);
  display:flex;align-items:center;gap:10px;}
.p-row:last-of-type{border-bottom:none;}
.p-name{flex:1;font-size:14px;}

/* 確認モーダル（画面中央に表示） */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:20px;}

════════════════════════
■ オピオイド
・現時点で無し→今後導入時の注意を先回りで記載
・レスキュー使用頻度増→定期投与への切替提案を★に
・腎機能低下時：モルヒネは活性代謝物蓄積に注意。オキシコドン・ヒドロモルフォンを考慮

・終了時期の目安（例：PCI後半年でアスピリン終了）が指示されていれば必ずOPに明記
・消化管出血・皮下出血・黒色便のモニタリングを★に
■ 抗凝固薬（DOAC等）
・出血傾向の観察。腎機能に応じた用量確認
・アバスチン等出血リスク薬との併用時は特に注意を明記
■ 利尿薬・降圧薬
・終末期・食事量低下時は必要性検討を★に
・電解質（K・Na）変動、脱水に注意
■ 睡眠薬・抗不安薬
・BZ系・Z drug（ゾルピデム等）→転倒・せん妄リスク
・オレキシン受容体拮抗薬（デエビゴ等）→悪夢・幻覚様体験・夜間の混乱に注意
・多剤併用時は減薬の必要性検討を★に

・イリノテカン→下痢対策に半夏瀉心湯は必須。腸内を酸性にする食品
　（ヨーグルト・乳酸菌製剤等）で下痢増悪の恐れあり、注意を明記

・骨髄抑制→発熱等感染徴候の早期発見
・治療ライン・効果判定予定日が分かれば記載
■ SGLT2阻害薬
・脱水リスク、水分摂取励行。尿路・性器感染症に注意
■ SSRI（セルトラリン等）
・低Na血症（SIADH）の可能性。Na低値があれば関連を考慮し★に
■ 腎機能低下時の注意薬剤
・メトホルミン：eGFR30未満で中止検討
・腎排泄性抗菌薬・DOAC：用量調整の確認
■ 電解質補正薬
・アスパラK等の大きい錠剤→嚥下面からも必要性検討
・補正値が基準内に戻っていれば中止検討を★に
■ 嚥下機能低下（とろみ食・ミキサー食・嚥下障害の記載がある患者）
・大きい錠剤・カプセルの剤形変更検討（OD錠・粉砕可否・液剤）を★に

　含まれる場合は必ず★で明示
■ 外用薬
・亜鉛華軟膏・アズノール→褥瘡・IADの部位・程度の確認を★に
・ステロイド外用→長期使用による皮膚萎縮・感染に注意
■ 漢方薬
・半夏瀉心湯：イリノテカン下痢予防／牛車腎気丸：神経障害性疼痛・しびれ／

以下に該当する事項があれば、薬歴本文の後（空行2行あけて）に

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      resolve({ base64: dataUrl.split(',')[1], dataUrl });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function base64ToUint8Array(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// 原本canvas(page.cleanCanvas)には一切fillRectしない。
// 書き出し時のみ複製canvasに矩形を焼き込むことで、原本のやり直しを常に安全にする。
function exportMaskedCanvas(cleanCanvas, regions) {
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = cleanCanvas.width;
  exportCanvas.height = cleanCanvas.height;
  const ctx = exportCanvas.getContext('2d');
  ctx.drawImage(cleanCanvas, 0, 0);
  ctx.fillStyle = '#000000';
  ctx.strokeStyle = '#000000';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  regions.filter(r => r.enabled).forEach(r => {
    if (r.type === 'stroke') {
      if (!r.points || r.points.length < 2) return;
      ctx.lineWidth = r.widthPct / 100 * cleanCanvas.width;
      ctx.beginPath();
      r.points.forEach((p, i) => {
        const x = p.xPct / 100 * cleanCanvas.width;
        const y = p.yPct / 100 * cleanCanvas.height;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      return;
    }
    const x = r.xPct / 100 * cleanCanvas.width;
    const y = r.yPct / 100 * cleanCanvas.height;
    const w = r.wPct / 100 * cleanCanvas.width;
    const h = r.hPct / 100 * cleanCanvas.height;
    ctx.fillRect(x, y, w, h);
  });
  return exportCanvas;
}

// OCR（Tesseract.js、WASM実行でブラウザ内完結。外部にデータは送信されない。
// 初回のみ日本語モデル取得のためのネットワークアクセスが発生する）
let ocrWorkerPromise = null;
function getOcrWorker(onProgress) {
  if (!ocrWorkerPromise) {
    ocrWorkerPromise = Tesseract.createWorker('jpn', 1, {
      logger: m => {
        if (m.status === 'recognizing text' && onProgress) onProgress(m.progress);
      }
    });
  }
  return ocrWorkerPromise;
}

async function runOcrOnCanvas(canvas, onProgress) {
  const worker = await getOcrWorker(onProgress);
  const { data } = await worker.recognize(canvas);
  return data;
}

// 行内の文字インデックス(行全体でのcharIdx)から、ピクセルX座標を求める。
// 日本語OCRでは語間にスペースがないため「ラベル：値」が1個のwordとして
// まとめて認識されることが多く、word境界だけでは値の開始位置を切り出せない。
// そのためword内では文字数に応じて等分割した位置を線形補間で求める
// （固定幅フォントの医療文書が主対象のため、この近似で十分実用的）。
function charIdxToX(wordRanges, lineCharIdx) {
  for (const r of wordRanges) {
    if (lineCharIdx >= r.start && lineCharIdx <= r.end) {
      const len = r.word.text.length;
      const frac = len > 0 ? (lineCharIdx - r.start) / len : 0;
      return r.word.bbox.x0 + frac * (r.word.bbox.x1 - r.word.bbox.x0);
    }
  }
  if (wordRanges.length === 0) return 0;
  return lineCharIdx <= 0 ? wordRanges[0].word.bbox.x0 : wordRanges[wordRanges.length - 1].word.bbox.x1;
}

// 行内のwordsからラベル文字列を探し、ヒットしたラベルの開始/終了X座標を返す。
// 「保険者番号：X　記号：Y　番号：Z」のように同一行に同一カテゴリのラベルが複数
// 並ぶケースを取りこぼさないよう、行内の全パターン出現位置を洗い出したうえで、
// 長いパターンを優先しつつ文字範囲が重ならないものだけを採用する（「電話番号」に
// 内包される「番号」のような短いパターンの誤爆・二重検出を防ぐため）。
function findLabelHitsInLine(words, labelDefs) {
  if (!words || words.length === 0) return [];
  let charIdx = 0;
  const wordRanges = words.map(w => {
    const start = charIdx;
    charIdx += w.text.length;
    return { word: w, start, end: charIdx };
  });
  const lineText = words.map(w => w.text).join('');

  const candidates = [];
  for (const def of labelDefs) {
    for (const pattern of def.patterns) {
      let idx = lineText.indexOf(pattern);
      while (idx !== -1) {
        candidates.push({ labelDef: def, start: idx, end: idx + pattern.length });
        idx = lineText.indexOf(pattern, idx + 1);
      }
    }
  }
  candidates.sort((a, b) => (b.end - b.start) - (a.end - a.start) || a.start - b.start);

  const claimed = [];
  const hits = [];
  for (const c of candidates) {
    if (claimed.some(r => c.start < r.end && c.end > r.start)) continue;
    claimed.push({ start: c.start, end: c.end });
    hits.push({
      labelDef: c.labelDef,
      startX: charIdxToX(wordRanges, c.start),
      endX: charIdxToX(wordRanges, c.end),
      endCharIdx: c.end,
    });
  }
  return hits;
}

// ラベルの右側のみを値域として矩形化する。右端は「次ラベルの開始位置」「行末」
// 「カテゴリごとの最大文字数」のうち最も狭いものを採用し、無制限に広がらないようにする。
function detectPiiRegions(ocrData, canvasW, canvasH) {
  const regions = [];
  (ocrData.lines || []).forEach(line => {
    if (!line.words || line.words.length === 0) return;
    const hits = findLabelHitsInLine(line.words, LABEL_DEFS);
    if (hits.length === 0) return;
    hits.sort((a, b) => a.endX - b.endX);
    const lineText = line.words.map(w => w.text).join('');
    const avgCharW = lineText.length > 0 ? (line.bbox.x1 - line.bbox.x0) / lineText.length : 14;
    hits.forEach((hit, i) => {
      const labelEndX = hit.endX;
      const nextHitX = hits[i + 1] ? hits[i + 1].startX : null;
      const lineRightX = line.bbox.x1;
      const valueRight = Math.min(
        nextHitX !== null ? nextHitX : Infinity,
        lineRightX,
        labelEndX + hit.labelDef.maxValueChars * avgCharW
      );
      if (valueRight - labelEndX > avgCharW * 1.2) {
        const x = labelEndX + 2;
        const y = line.bbox.y0 - 3;
        const w = valueRight - labelEndX - 4;
        const h = (line.bbox.y1 - line.bbox.y0) + 6;
        // ラベルの右側に実際に書かれていた値の文字列そのものも保持しておく。
        // 同一ファイル内の別の場所（ラベルなしのカルテ本文など）に、この値と
        // 完全一致するテキストが再登場した場合の追加検出（後段2巡目）に使う。
        const valueCharLen = Math.max(1, Math.round((valueRight - labelEndX) / avgCharW));
        // ラベル直後の「：」「:」等の区切り文字は値そのものではないため、
        // 完全一致の再検出が空振りしないよう取り除いておく。
        const matchedText = lineText.slice(hit.endCharIdx, hit.endCharIdx + valueCharLen)
          .replace(/^[：:\s　]+/, '').trim();
        regions.push({
          id: uid(), category: hit.labelDef.category, source: 'auto', type: 'rect', enabled: true,
          matchedText,
          xPct: Math.max(0, x / canvasW * 100),
          yPct: Math.max(0, y / canvasH * 100),
          wPct: Math.min(100, w / canvasW * 100),
          hPct: Math.min(100, h / canvasH * 100),
        });
      }
    });
  });
  return regions;
}

// 2つの矩形（%座標）が実質的に重なっているかどうかを判定する。
// 「完全一致の再検出」が、ラベル検出済みの箇所そのものを二重に検出してしまう
// のを防ぐために使う（新規候補の面積の30%以上が既存矩形と重なれば重複とみなす）。
function regionsOverlap(a, b) {
  const ax0 = a.xPct, ax1 = a.xPct + a.wPct, ay0 = a.yPct, ay1 = a.yPct + a.hPct;
  const bx0 = b.xPct, bx1 = b.xPct + b.wPct, by0 = b.yPct, by1 = b.yPct + b.hPct;
  const ix0 = Math.max(ax0, bx0), ix1 = Math.min(ax1, bx1);
  const iy0 = Math.max(ay0, by0), iy1 = Math.min(ay1, by1);
  if (ix1 <= ix0 || iy1 <= iy0) return false;
  const interArea = (ix1 - ix0) * (iy1 - iy0);
  const aArea = a.wPct * a.hPct;
  return aArea > 0 && interArea / aArea > 0.3;
}

// 一度検出された値（氏名など）と「完全一致」する文字列を、ラベルの手がかりが
// ない箇所（カルテ本文の自由記述など）からも探して矩形化する。部分一致による
// 誤検出（診療情報の巻き添えマスキング）を避けるため、あくまで文字列の完全一致のみを対象とする。
function findExactMatchRegions(ocrData, matchedTexts, canvasW, canvasH) {
  const regions = [];
  if (!matchedTexts || matchedTexts.length === 0) return regions;
  (ocrData.lines || []).forEach(line => {
    if (!line.words || line.words.length === 0) return;
    let charIdx = 0;
    const wordRanges = line.words.map(w => {
      const start = charIdx;
      charIdx += w.text.length;
      return { word: w, start, end: charIdx };
    });
    const lineText = line.words.map(w => w.text).join('');
    matchedTexts.forEach(({ text, category }) => {
      if (!text) return;
      let idx = lineText.indexOf(text);
      while (idx !== -1) {
        const x0 = charIdxToX(wordRanges, idx) - 2;
        const x1 = charIdxToX(wordRanges, idx + text.length) + 2;
        const y = line.bbox.y0 - 3;
        const h = (line.bbox.y1 - line.bbox.y0) + 6;
        regions.push({
          id: uid(), category, source: 'auto', via: 'exact', type: 'rect', enabled: true,
          xPct: Math.max(0, x0 / canvasW * 100),
          yPct: Math.max(0, y / canvasH * 100),
          wPct: Math.min(100, (x1 - x0) / canvasW * 100),
          hPct: Math.min(100, h / canvasH * 100),
        });
        idx = lineText.indexOf(text, idx + 1);
      }
    });
  });
  return regions;
}

function toEra(year) {
  if (year >= 2019) return `R${year - 2018}`;
  if (year >= 1989) return `H${year - 1988}`;
  if (year >= 1926) return `S${year - 1925}`;
  return String(year);
}

function todayEraStr() {
  const d = new Date();
  return `${toEra(d.getFullYear())}.${d.getMonth() + 1}.${d.getDate()}`;
}

function convertEraInText(text) {
  let t = text;
  t = t.replace(/(19|20)(\d{2})年(\d{1,2})月(\d{1,2})日/g, (m, c, yy, mo, da) => `${toEra(parseInt(c + yy, 10))}.${parseInt(mo, 10)}.${parseInt(da, 10)}`);
  t = t.replace(/(19|20)(\d{2})年(\d{1,2})月(?!\d)/g, (m, c, yy, mo) => `${toEra(parseInt(c + yy, 10))}.${parseInt(mo, 10)}`);
  t = t.replace(/(19|20)(\d{2})年(?!\d)/g, (m, c, yy) => `${toEra(parseInt(c + yy, 10))}年`);
  t = t.replace(/\b(19|20)(\d{2})[\/\-](\d{1,2})[\/\-](\d{1,2})\b/g, (m, c, yy, mo, da) => `${toEra(parseInt(c + yy, 10))}.${parseInt(mo, 10)}.${parseInt(da, 10)}`);
  return t;
}

function removeBlankLines(text) {
  return text.split('\n').filter(l => l.trim() !== '').join('\n');
}

function removeLHMarkers(text) {
  return text.replace(/[（(]\s*[LH]\s*[）)]/g, '');
}

function finalizeBlockText(text) {
  return convertEraInText(removeLHMarkers(removeBlankLines(text || '')));
}

function detectOpioidInText(text) {
  return OPIOID_KEYWORDS.some(kw => (text || '').includes(kw));
}

// ── レスポンスのパース ──
function parseResponse(rawText) {
  let text = (rawText || '').trim();

  let knowledgeSuggestions = [];
  const ksMatch = text.match(/★ナレッジ提案★([\s\S]*)$/);
  if (ksMatch) {
    text = text.slice(0, ksMatch.index).trim();
    knowledgeSuggestions = ksMatch[1].split('\n').map(l => l.trim()).filter(l => l.startsWith('・')).map(l => l.replace(/^・/, '').trim());
  }

  let confirmItems = [];
  const cMatch = text.match(/★確認事項★([\s\S]*)$/);
  if (cMatch) {
    text = text.slice(0, cMatch.index).trim();
    confirmItems = cMatch[1].split('\n').map(l => l.trim()).filter(l => l.startsWith('・')).map(l => l.replace(/^・/, '').trim());
  }

  const blockRe = /##(S|O|A|EP|OP)##/g;
  const matches = [];
  let m;
  while ((m = blockRe.exec(text))) matches.push({ key: m[1], start: m.index, contentStart: m.index + m[0].length });

  if (matches.length === 0) {
    return { parseFailed: true, rawText, confirmItems, knowledgeSuggestions };
  }

  const blocks = {};
  for (let i = 0; i < matches.length; i++) {
    const end = i + 1 < matches.length ? matches[i + 1].start : text.length;
    blocks[matches[i].key] = text.slice(matches[i].contentStart, end).trim();
  }

  const requiredKeys = ['S', 'O', 'A', 'EP', 'OP'];
  const missingCount = requiredKeys.filter(k => !(k in blocks)).length;
  if (missingCount >= 3) {
    return { parseFailed: true, rawText, confirmItems, knowledgeSuggestions };
  }

  return {
    parseFailed: false,
    sText: blocks.S || '',
    oText: blocks.O || '',
    aRawText: blocks.A || '',
    epText: blocks.EP || '',
    opText: blocks.OP || '',
    confirmItems,
    knowledgeSuggestions,
    rawText
  };
}

function normalizeOPLine(line) {
  const trimmed = line.replace(/^[\s　]+/, '');
  if (!trimmed) return '';
  return '　' + trimmed;
}

function splitOPProblems(opText) {
  const visitIdx = opText.indexOf('【訪問予定】');
  const body = (visitIdx >= 0 ? opText.slice(0, visitIdx) : opText).trim();
  const visitText = (visitIdx >= 0 ? opText.slice(visitIdx) : '').trim();

  const lines = body.split('\n');
  const problems = [];
  let cur = null;
  for (const rawLine of lines) {
    if (/^[＃#]/.test(rawLine.trim())) {
      if (cur) problems.push(cur);
      cur = { id: uid(), title: rawLine.trim(), bodyLines: [], checked: true };
    } else if (cur) {
      cur.bodyLines.push(normalizeOPLine(rawLine));
    }
  }
  if (cur) problems.push(cur);

  problems.forEach(p => { p.isOpioidMandatory = OPIOID_TITLE_RE.test(p.title); });

  return { problems, visitText };
}

function getProblemName(title) {
  return title.replace(/^[＃#]\s*/, '').trim();
}

function computeAutoAText(aRawText, opProblems) {
  const disabledNames = opProblems.filter(p => !p.checked && !p.isOpioidMandatory).map(p => getProblemName(p.title)).filter(Boolean);
  if (disabledNames.length === 0) return aRawText;
  return aRawText.split('\n').filter(line => {
    const t = line.trim();
    if (!/^[＃#]/.test(t)) return true;
    return !disabledNames.some(name => t.includes(name));
  }).join('\n');
}

function buildOPText(problems, visitText) {
  const activeParts = problems.filter(p => p.checked || p.isOpioidMandatory)
    .map(p => [p.title, ...p.bodyLines].join('\n').replace(/\n+$/, ''));
  const combined = activeParts.join('\n\n');
  if (!visitText) return combined;
  return combined ? combined + '\n\n' + visitText : visitText;
}

function buildSystemPrompt(knowledgeDB) {
  let prompt = SYSTEM_PROMPT_BASE.replace('{{TODAY}}', todayEraStr()) + KNOWLEDGE_SUGGESTION_INSTRUCTION;
  if (knowledgeDB && knowledgeDB.length > 0) {
    prompt += '\n\n【蓄積ナレッジ】\n' + knowledgeDB.map(k => `・[${k.category}] [${k.drug}]：${k.content}`).join('\n');
  }
  return prompt;
}

function buildContentBlocks(files) {
  const blocks = files.map(f => {
    if (f.kind === 'pdf') {
      return { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.base64 } };
    }
    return { type: 'image', source: { type: 'base64', media_type: f.mediaType, data: f.base64 } };
  });
  blocks.push({
    type: 'text',
    text: '添付書類をもとに、新規入所患者の初回薬歴をルールに従って作成してください。',
    cache_control: { type: 'ephemeral' }
  });
  return blocks;
}

async function callClaudeOnce(cleanKey, systemPrompt, messages, onDelta, textSoFar) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': cleanKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 16000,
      temperature: 0,
      stream: true,
      system: [
        { type: 'text', text: systemPrompt, cache_control: { type: 'ephemeral' } }
      ],
      messages
    })
  });
  if (!res.ok) {
    let msg = `APIエラー (${res.status})`;
    try { const err = await res.json(); msg = (err.error && err.error.message) || msg; } catch (e) {}
    throw new Error(msg);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let text = textSoFar;
  let stopReason = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const payload = line.slice(6).trim();
      if (!payload) continue;
      let evt;
      try { evt = JSON.parse(payload); } catch (e) { continue; }
      if (evt.type === 'content_block_delta' && evt.delta && evt.delta.type === 'text_delta') {
        text += evt.delta.text;
        if (onDelta) onDelta(text);
      } else if (evt.type === 'message_delta' && evt.delta && evt.delta.stop_reason) {
        stopReason = evt.delta.stop_reason;
      } else if (evt.type === 'error') {
        throw new Error((evt.error && evt.error.message) || 'ストリーミング中にエラーが発生しました。');
      }
    }
  }

  return { text, stopReason };
}

async function callClaude(apiKey, systemPrompt, files, onDelta) {
  const cleanKey = apiKey.replace(/[^\x21-\x7E]/g, '');
  if (!cleanKey) {
    throw new Error('APIキーに使用できない文字が含まれています。設定画面でキーを入力し直してください。');
  }

  const userContent = buildContentBlocks(files);
  const MAX_CONTINUATIONS = 2;
  let text = '';
  let stopReason = null;

  for (let attempt = 0; attempt <= MAX_CONTINUATIONS; attempt++) {
    const messages = attempt === 0
      ? [{ role: 'user', content: userContent }]
      : [{ role: 'user', content: userContent }, { role: 'assistant', content: text }];
    const result = await callClaudeOnce(cleanKey, systemPrompt, messages, onDelta, text);
    text = result.text;
    stopReason = result.stopReason;

    if (!text.trim()) {
      if (stopReason === 'refusal') {
        throw new Error('AIが安全フィルターにより生成を拒否しました（stop_reason: refusal）。添付内容を見直すか、時間を置いて再度お試しください。');
      }
      throw new Error(`AIから本文が返されませんでした（stop_reason: ${stopReason || '不明'}）。`);
    }

    if (stopReason !== 'max_tokens') break;
  }

  return text;
}

function loadKnowledgeDB() {
  try { return JSON.parse(localStorage.getItem(LS_KNOWLEDGE) || '[]'); } catch (e) { return []; }
}
function saveKnowledgeDBToStorage(db) {
  try { localStorage.setItem(LS_KNOWLEDGE, JSON.stringify(db)); } catch (e) { console.error('ナレッジDB保存に失敗', e); }
}

function MaskRectView({ region, onMouseDownMove, onMouseDownResize, onDelete }) {
  const style = {
    left: region.xPct + '%', top: region.yPct + '%',
    width: region.wPct + '%', height: region.hPct + '%',
  };
  return (
    <div className={`mask-rect ${region.enabled ? '' : 'disabled'}`} style={style} onMouseDown={onMouseDownMove}>
      <span className="rect-label">{region.category}</span>
      <span className="rect-close" onMouseDown={e => e.stopPropagation()} onClick={onDelete}>✕</span>
      <div className="rect-handle" onMouseDown={onMouseDownResize}></div>
    </div>
  );
}

function MaskStrokeView({ region, onDelete }) {
  const pts = region.points;
  const xs = pts.map(p => p.xPct), ys = pts.map(p => p.yPct);
  const closeX = Math.max(...xs);
  const closeY = Math.min(...ys);
  return (
    <span className="stroke-close" style={{ left: closeX + '%', top: closeY + '%' }}
      onMouseDown={e => e.stopPropagation()} onClick={onDelete}>✕</span>
  );
}

function PageEditor({ page, onRegionsChange, debugWords }) {
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const overlayRef = useRef(null);
  const dragRef = useRef(null);
  const [draft, setDraft] = useState(null);
  const [draftStroke, setDraftStroke] = useState(null);
  const [tool, setTool] = useState('rect');
  // ペンの太さは「画面表示上の何px」かで直接指定する（最大32pxで頭打ち＝それ以上太くしない）。
  const [penWidthPx, setPenWidthPx] = useState(10);
  const [hoverPct, setHoverPct] = useState(null);
  const [dispW, setDispW] = useState(0);

  const canvasW = page.cleanCanvas ? page.cleanCanvas.width : 0;
  const canvasH = page.cleanCanvas ? page.cleanCanvas.height : 0;
  // 表示px→canvas実ピクセルへの換算係数。実際に描画・書き出しされる太さも、常に画面上でpenWidthPxちょうどに見えるようにする。
  const penWidthCanvasPx = dispW > 0 ? penWidthPx * canvasW / dispW : penWidthPx;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !page.cleanCanvas) return;
    canvas.width = page.cleanCanvas.width;
    canvas.height = page.cleanCanvas.height;
    canvas.getContext('2d').drawImage(page.cleanCanvas, 0, 0);
  }, [page.cleanCanvas]);

  // 画像の実際の表示幅を計測し、スライダー横のサンプルが本当に塗られる太さと
  // 画面上で一致するようにする（画面幅で見た目のサイズが変わるため）。
  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const update = () => setDispW(el.getBoundingClientRect().width);
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [page.cleanCanvas]);

  function getPct(e) {
    const rect = wrapRef.current.getBoundingClientRect();
    const xPct = Math.min(100, Math.max(0, (e.clientX - rect.left) / rect.width * 100));
    const yPct = Math.min(100, Math.max(0, (e.clientY - rect.top) / rect.height * 100));
    return { xPct, yPct };
  }

  function handleWrapMouseDown(e) {
    if (e.target !== overlayRef.current) return;
    const { xPct, yPct } = getPct(e);
    if (tool === 'pen') {
      dragRef.current = { mode: 'pen', points: [{ xPct, yPct }] };
      setDraftStroke([{ xPct, yPct }]);
    } else {
      dragRef.current = { mode: 'new', startX: xPct, startY: yPct, draft: { xPct, yPct, wPct: 0, hPct: 0 } };
    }
    e.preventDefault();
  }

  function handleOverlayMouseMove(e) {
    if (tool === 'pen') setHoverPct(getPct(e));
  }

  function handleRectMouseDown(e, region, mode) {
    e.stopPropagation();
    const { xPct, yPct } = getPct(e);
    dragRef.current = { mode, id: region.id, startX: xPct, startY: yPct, orig: { ...region } };
  }

  useEffect(() => {
    function onMove(e) {
      const d = dragRef.current;
      if (!d) return;
      const { xPct, yPct } = getPct(e);
      if (d.mode === 'new') {
        const x = Math.min(d.startX, xPct), y = Math.min(d.startY, yPct);
        const w = Math.abs(xPct - d.startX), h = Math.abs(yPct - d.startY);
        d.draft = { xPct: x, yPct: y, wPct: w, hPct: h };
        setDraft(d.draft);
      } else if (d.mode === 'pen') {
        d.points.push({ xPct, yPct });
        setDraftStroke(d.points.slice());
      } else if (d.mode === 'move') {
        const dx = xPct - d.startX, dy = yPct - d.startY;
        const newX = Math.min(100 - d.orig.wPct, Math.max(0, d.orig.xPct + dx));
        const newY = Math.min(100 - d.orig.hPct, Math.max(0, d.orig.yPct + dy));
        onRegionsChange(page.regions.map(r => r.id === d.id ? { ...r, xPct: newX, yPct: newY } : r));
      } else if (d.mode === 'resize') {
        const dx = xPct - d.startX, dy = yPct - d.startY;
        const newW = Math.max(1, Math.min(100 - d.orig.xPct, d.orig.wPct + dx));
        const newH = Math.max(1, Math.min(100 - d.orig.yPct, d.orig.hPct + dy));
        onRegionsChange(page.regions.map(r => r.id === d.id ? { ...r, wPct: newW, hPct: newH } : r));
      }
    }
    function onUp() {
      const d = dragRef.current;
      if (d && d.mode === 'new' && d.draft && d.draft.wPct > 1 && d.draft.hPct > 1) {
        onRegionsChange([...page.regions, { id: uid(), category: '手動', source: 'manual', type: 'rect', enabled: true, ...d.draft }]);
      } else if (d && d.mode === 'pen' && d.points && d.points.length > 1) {
        const widthPct = canvasW > 0 ? penWidthCanvasPx / canvasW * 100 : 0;
        onRegionsChange([...page.regions, { id: uid(), category: '手動', source: 'manual', type: 'stroke', enabled: true, points: d.points, widthPct }]);
      }
      dragRef.current = null;
      setDraft(null);
      setDraftStroke(null);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [page.regions, onRegionsChange, penWidthCanvasPx, canvasW]);

  const rectRegions = page.regions.filter(r => r.type !== 'stroke');
  const strokeRegions = page.regions.filter(r => r.type === 'stroke');

  return (
    <div className="mask-editor">
      <div className="tool-bar">
        <div className="seg">
          <button type="button" className={`seg-btn ${tool === 'rect' ? 'active' : ''}`} onClick={() => setTool('rect')}>⬛ 四角</button>
          <button type="button" className={`seg-btn ${tool === 'pen' ? 'active' : ''}`} onClick={() => setTool('pen')}>🖊️ ペン</button>
        </div>
        {tool === 'pen' && (
          <label className="pen-width">
            太さ
            <input type="range" min="2" max="32" step="1" value={penWidthPx}
              onChange={e => setPenWidthPx(Number(e.target.value))} />
            <span className="pen-preview">
              <span className="pen-dot" style={{ width: penWidthPx + 'px', height: penWidthPx + 'px' }}></span>
            </span>
          </label>
        )}
      </div>
      <div className="mask-canvas-wrap" ref={wrapRef}>
        <canvas ref={canvasRef}></canvas>
        <div className="mask-overlay" ref={overlayRef} onMouseDown={handleWrapMouseDown}
          onMouseMove={handleOverlayMouseMove} onMouseLeave={() => setHoverPct(null)}>
          {debugWords && debugWords.map(w => (
            <div key={w.id} className="debug-word-box" title={w.text}
              style={{ left: w.xPct + '%', top: w.yPct + '%', width: w.wPct + '%', height: w.hPct + '%' }}></div>
          ))}
          {canvasW > 0 && (strokeRegions.length > 0 || (draftStroke && draftStroke.length > 1) || (tool === 'pen' && hoverPct)) && (
            <svg className="stroke-svg" viewBox={`0 0 ${canvasW} ${canvasH}`} preserveAspectRatio="none">
              {strokeRegions.map(r => (
                <polyline key={r.id} fill="none" strokeLinecap="round" strokeLinejoin="round"
                  stroke={r.enabled ? 'rgba(10,10,12,0.88)' : 'rgba(255,149,0,0.4)'}
                  strokeWidth={r.widthPct / 100 * canvasW}
                  points={r.points.map(p => `${p.xPct / 100 * canvasW},${p.yPct / 100 * canvasH}`).join(' ')} />
              ))}
              {draftStroke && draftStroke.length > 1 && (
                <polyline fill="none" strokeLinecap="round" strokeLinejoin="round"
                  stroke="rgba(0,122,255,0.55)" strokeWidth={penWidthCanvasPx}
                  points={draftStroke.map(p => `${p.xPct / 100 * canvasW},${p.yPct / 100 * canvasH}`).join(' ')} />
              )}
              {tool === 'pen' && hoverPct && !draftStroke && (
                <circle cx={hoverPct.xPct / 100 * canvasW} cy={hoverPct.yPct / 100 * canvasH}
                  r={penWidthCanvasPx / 2}
                  fill="rgba(0,122,255,0.28)" stroke="rgba(0,122,255,0.85)" strokeWidth={canvasW / 500} />
              )}
            </svg>
          )}
          {strokeRegions.map(r => (
            <MaskStrokeView key={r.id} region={r}
              onDelete={() => onRegionsChange(page.regions.filter(x => x.id !== r.id))} />
          ))}
          {rectRegions.map(r => (
            <MaskRectView key={r.id} region={r}

              onMouseDownResize={e => handleRectMouseDown(e, r, 'resize')}

          {draft && (

      </div>
    </div>
  );

function PdfViewer({ file }) {
  const canvasRef = useRef(null);
  const pdfRef = useRef(null);
  const [numPages, setNumPages] = useState(0);
  const [page, setPage] = useState(1);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    setPage(1);
    setError(null);
    pdfjsLib.getDocument({ data: base64ToUint8Array(file.base64) }).promise.then(pdf => {
      if (cancelled) return;
      pdfRef.current = pdf;
      setNumPages(pdf.numPages);
    }).catch(e => { if (!cancelled) setError('PDFの読み込みに失敗しました: ' + e.message); });
    return () => { cancelled = true; };
  }, [file.id]);

  useEffect(() => {
    if (!pdfRef.current || !canvasRef.current) return;
    let cancelled = false;
    pdfRef.current.getPage(page).then(pg => {
      if (cancelled) return;
      const viewport = pg.getViewport({ scale: 1.3 });
      const canvas = canvasRef.current;
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      pg.render({ canvasContext: ctx, viewport });
    });
    return () => { cancelled = true; };
  }, [page, numPages]);

  if (error) return <div className="err">{error}</div>;

  return (
    <div>
      <canvas ref={canvasRef}></canvas>
      {numPages > 1 && (
        <div className="pdf-nav">
          <button className="icon-btn" onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page <= 1}>◀</button>
          <span className="text-sm">{page} / {numPages}</span>
          <button className="icon-btn" onClick={() => setPage(p => Math.min(numPages, p + 1))} disabled={page >= numPages}>▶</button>
        </div>
      )}
    </div>
  );
}

function SourcePane({ files, setFiles, collapsed, setCollapsed, activeFileId, setActiveFileId }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);
  const activeFile = files.find(f => f.id === activeFileId) || files[0];

  async function handleFileList(fileList) {
    const arr = Array.from(fileList);
    const added = [];
    for (const f of arr) {
      const isPdf = f.type === 'application/pdf';
      const isImage = f.type.startsWith('image/');
      if (!isPdf && !isImage) continue;
      try {
        const { base64, dataUrl } = await readFileAsBase64(f);
        added.push({ id: uid(), name: f.name, kind: isPdf ? 'pdf' : 'image', mediaType: f.type, base64, dataUrl });
      } catch (e) { console.error('ファイル読み込み失敗', e); }
    }
    if (added.length > 0) {
      setFiles(prev => [...prev, ...added]);
      setActiveFileId(added[0].id);
    }
  }

  function removeFile(id, e) {
    e.stopPropagation();
    setFiles(prev => prev.filter(f => f.id !== id));
    if (activeFileId === id) setActiveFileId(null);
  }

  if (collapsed) {
    return (
      <div className="source-pane collapsed">
        <div className="source-collapsed-bar" onClick={() => setCollapsed(false)}>▶ 元資料を表示</div>
      </div>
    );
  }

  return (
    <div className="source-pane">
      <div className="source-body">
        <div className="source-header">
          <span className="sec-label" style={{ padding: 0 }}>元資料</span>
          <button className="btn btn-ghost btn-sm" onClick={() => setCollapsed(true)}>◀ 折りたたむ</button>
        </div>

        <div className="card" style={{ padding: 12 }}>
          <div className={`dropzone ${dragOver ? 'over' : ''}`}
            onClick={() => inputRef.current && inputRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); handleFileList(e.dataTransfer.files); }}>
            <div className="dz-icon">📄</div>
            <div className="dz-title">書類をドラッグ＆ドロップ</div>
            <div className="dz-sub">またはクリックしてPDF・画像を選択（複数可）</div>
          </div>
          <input ref={inputRef} type="file" accept="application/pdf,image/*" multiple style={{ display: 'none' }}
            onChange={e => { handleFileList(e.target.files); e.target.value = ''; }} />

          {files.length > 0 && (
            <div className="file-tabs mt-12">
              {files.map(f => (
                <div key={f.id} className={`file-tab ${activeFile && activeFile.id === f.id ? 'sel' : ''}`}
                  onClick={() => setActiveFileId(f.id)}>
                  <span>{f.kind === 'pdf' ? '📄' : '🖼️'} {f.name}</span>
                  <span className="rm" onClick={e => removeFile(f.id, e)}>✕</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {activeFile && (
          <div className="viewer-box mt-12">
            {activeFile.kind === 'pdf'
              ? <PdfViewer file={activeFile} />
              : <img src={activeFile.dataUrl} alt={activeFile.name} />}
          </div>
        )}
      </div>
    </div>
  );
}
