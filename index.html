  const [maskActiveFileId, setMaskActiveFileId] = useState(null);
  const [maskDragOver, setMaskDragOver] = useState(false);
  const [maskBulkProgress, setMaskBulkProgress] = useState(null); // { done, total, pageFrac }
  const [maskConfirming, setMaskConfirming] = useState(false);
  const [maskExporting, setMaskExporting] = useState(false);
  const [showDebugWords, setShowDebugWords] = useState(false);
  const [maskConfirmDialog, setMaskConfirmDialog] = useState(null); // { message, onConfirm }
  const maskInputRef = useRef(null);
  const maskPdfDocCache = useRef({});

  const maskActiveFile = maskFiles.find(f => f.id === maskActiveFileId) || null;

  // ページごとのOCR単語枠（デバッグ表示用）をその場で組み立てる。
  // showDebugWordsがオフの間は計算しない。
  function computeDebugWords(page) {
    if (!showDebugWords || !page.ocrData || !page.cleanCanvas) return [];
    const w = page.cleanCanvas.width, h = page.cleanCanvas.height;
    const words = [];
    (page.ocrData.lines || []).forEach(line => {
      (line.words || []).forEach(word => {
        words.push({
          id: uid(), text: word.text,
          xPct: word.bbox.x0 / w * 100, yPct: word.bbox.y0 / h * 100,
          wPct: (word.bbox.x1 - word.bbox.x0) / w * 100, hPct: (word.bbox.y1 - word.bbox.y0) / h * 100,
        });
      });
    });
    return words;
  }

  async function initMaskFilePages(fileObj) {
    if (fileObj.kind === 'pdf') {
      const pdf = await pdfjsLib.getDocument({ data: base64ToUint8Array(fileObj.base64) }).promise;
      maskPdfDocCache.current[fileObj.id] = pdf;
      const numPages = pdf.numPages;
      const pages = Array.from({ length: numPages }, () => ({ cleanCanvas: null, regions: [], ocrData: null }));
      setMaskFiles(prev => prev.map(f => f.id === fileObj.id ? { ...f, numPages, pages } : f));
    } else {
      const img = await loadImage(fileObj.dataUrl);
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      const pages = [{ cleanCanvas: canvas, regions: [], ocrData: null }];
      setMaskFiles(prev => prev.map(f => f.id === fileObj.id ? { ...f, numPages: 1, pages } : f));
    }
  }

  async function handleMaskFileList(fileList) {
    const arr = Array.from(fileList).filter(f => f.type === 'application/pdf' || f.type.startsWith('image/'));
    if (arr.length === 0) return;
    for (const f of arr) {
      const isPdf = f.type === 'application/pdf';
      try {
        const { base64, dataUrl } = await readFileAsBase64(f);
        const fileObj = { id: uid(), name: f.name, kind: isPdf ? 'pdf' : 'image', mediaType: f.type, base64, dataUrl, numPages: null, pages: null };
        setMaskFiles(prev => [...prev, fileObj]);
        setMaskActiveFileId(prevId => prevId || fileObj.id);
        await initMaskFilePages(fileObj);
      } catch (e) {
        console.error('ファイル読み込み失敗', e);
        showToast('ファイルの読み込みに失敗しました: ' + f.name);
      }
    }
  }

  async function renderMaskPdfPageCanvas(fileId, pageIndex) {
    const pdf = maskPdfDocCache.current[fileId];
    if (!pdf) return null;
    const page = await pdf.getPage(pageIndex + 1);
    const viewport = page.getViewport({ scale: MASK_RENDER_SCALE });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    return canvas;
  }

  async function ensureMaskPageRendered(fileId, pageIndex) {
    const canvas = await renderMaskPdfPageCanvas(fileId, pageIndex);
    if (!canvas) return;
    setMaskFiles(prev => prev.map(f => {
      if (f.id !== fileId || !f.pages) return f;
      const pages = f.pages.slice();
      pages[pageIndex] = { ...pages[pageIndex], cleanCanvas: canvas };
      return { ...f, pages };
    }));
  }

  // スクロールで全ページを見られるようにするため、未レンダリングのページを
  // 1つずつ順番にレンダリングしていく（レンダリングのたびにpagesが更新され、
  // このeffectが再発火して次の未レンダリングページを処理する）。
  useEffect(() => {
    if (!maskActiveFile || !maskActiveFile.pages || maskActiveFile.kind !== 'pdf') return;
    const idx = maskActiveFile.pages.findIndex(p => !p.cleanCanvas);
    if (idx === -1) return;
    ensureMaskPageRendered(maskActiveFile.id, idx);
  }, [maskActiveFile && maskActiveFile.id, maskActiveFile && maskActiveFile.pages]);

  // 全ファイル・全ページを対象に、文字認識と個人情報検出を1ボタンでまとめて行う。
  // ページごとに「文字を検出」→「個人情報を検出」を別々に押す手間をなくすための一括処理。
  async function detectAllMaskFiles() {
    if (maskBulkProgress) return;
    const jobs = [];
    maskFiles.forEach(f => {
      if (!f.pages) return;
      f.pages.forEach((p, idx) => jobs.push({ fileId: f.id, pageIndex: idx }));
    });
    if (jobs.length === 0) {
      showToast('先にファイルをアップロードしてください');
      return;
    }
    setMaskBulkProgress({ done: 0, total: jobs.length, pageFrac: 0 });
    let totalDetected = 0;
    const pageResults = []; // 2巡目（完全一致の再検出）のため、OCR結果とファイルIDを覚えておく
    try {
      for (let i = 0; i < jobs.length; i++) {
        const { fileId, pageIndex } = jobs[i];
        const fileSnap = maskFiles.find(f => f.id === fileId);
        const pageSnap = fileSnap && fileSnap.pages[pageIndex];
        let canvas = pageSnap && pageSnap.cleanCanvas;
        if (!canvas) {
          canvas = await renderMaskPdfPageCanvas(fileId, pageIndex);
          const renderedCanvas = canvas;
          setMaskFiles(prev => prev.map(f => f.id !== fileId ? f : {
            ...f, pages: f.pages.map((p, idx) => idx !== pageIndex ? p : { ...p, cleanCanvas: renderedCanvas }),
          }));
        }
        if (!canvas) continue;
        const ocrData = await runOcrOnCanvas(canvas, frac => {
          setMaskBulkProgress({ done: i, total: jobs.length, pageFrac: frac });
        });
        const detected = detectPiiRegions(ocrData, canvas.width, canvas.height);
        totalDetected += detected.length;
        pageResults.push({ fileId, pageIndex, ocrData, canvasW: canvas.width, canvasH: canvas.height, autoRegions: detected });
        setMaskFiles(prev => prev.map(f => f.id !== fileId ? f : {
          ...f, pages: f.pages.map((p, idx) => idx !== pageIndex ? p : {
            ...p, ocrData, regions: [...p.regions.filter(r => r.source !== 'auto'), ...detected],
          }),
        }));
        setMaskBulkProgress({ done: i + 1, total: jobs.length, pageFrac: 0 });
      }

      // 2巡目：同一ファイル内で、検出済みの値（氏名など）と「完全一致」するテキストが
      // ラベルの手がかりなし（カルテ本文の自由記述など）に再登場していないか確認し、
      // 見つかった箇所も自動検出に加える。誤爆防止のため、短すぎる値（記号など）は対象外。
      const MIN_PROPAGATE_LEN = 4;
      let totalPropagated = 0;
      const fileIds = [...new Set(pageResults.map(r => r.fileId))];
      for (const fileId of fileIds) {
        const filePages = pageResults.filter(r => r.fileId === fileId);
        const seen = new Map();
        filePages.forEach(r => {
          r.autoRegions.forEach(reg => {
            const text = (reg.matchedText || '').trim();
            if (text.length >= MIN_PROPAGATE_LEN && !seen.has(text)) seen.set(text, reg.category);
          });
        });
        const matchedTexts = [...seen.entries()].map(([text, category]) => ({ text, category }));
        if (matchedTexts.length === 0) continue;
        for (const r of filePages) {
          const candidates = findExactMatchRegions(r.ocrData, matchedTexts, r.canvasW, r.canvasH);
          const extra = [];
          candidates.forEach(c => {
            if (r.autoRegions.some(e => regionsOverlap(c, e)) || extra.some(e => regionsOverlap(c, e))) return;
            extra.push(c);
          });
          if (extra.length === 0) continue;
          totalPropagated += extra.length;
          setMaskFiles(prev => prev.map(f => f.id !== r.fileId ? f : {
            ...f, pages: f.pages.map((p, idx) => idx !== r.pageIndex ? p : { ...p, regions: [...p.regions, ...extra] }),
          }));
        }
      }

      showToast(totalPropagated > 0
        ? `${jobs.length}ページを解析し、${totalDetected}件検出（同一語の再検出${totalPropagated}件を追加）しました`
        : `${jobs.length}ページを解析し、${totalDetected}件の個人情報候補を検出しました`);
    } catch (e) {
      console.error('個人情報検出に失敗', e);
      showToast('検出処理に失敗しました: ' + e.message);
    } finally {
      setMaskBulkProgress(null);
    }
  }

  const updateMaskPageRegions = useCallback((pageIndex, newRegions) => {
    setMaskFiles(prev => prev.map(f => {
      if (f.id !== maskActiveFileId || !f.pages) return f;
      const pages = f.pages.slice();
      pages[pageIndex] = { ...pages[pageIndex], regions: newRegions };
      return { ...f, pages };
    }));
  }, [maskActiveFileId]);

  function removeMaskFile(id, e) {
    if (e) e.stopPropagation();
    setMaskFiles(prev => prev.filter(f => f.id !== id));
    delete maskPdfDocCache.current[id];
    if (maskActiveFileId === id) {
      setMaskActiveFileId(null);
    }
  }

  function selectMaskFile(id) {
    setMaskActiveFileId(id);
  }

  // 不要なページ（白紙・関係ない用紙など）を1枚だけ取り除けるようにする。誤操作防止のため画面中央の確認モーダルを挟む。
  function deleteMaskPage(fileId, pageIndex) {
    setMaskConfirmDialog({
      message: `ページ ${pageIndex + 1} を削除します。よろしいですか？`,
      onConfirm: () => {
        setMaskFiles(prev => prev.map(f => {
          if (f.id !== fileId || !f.pages) return f;
          const pages = f.pages.filter((_, idx) => idx !== pageIndex);
          return { ...f, pages, numPages: pages.length };
        }));
        setMaskConfirmDialog(null);
      },
    });
  }

  // マスク焼き込み前のcanvasを全ページ分作る（PDFの再レンダリングはここで1回だけ行い、
  // 容量調整のための再エンコード（画質を変えたtoDataURL呼び出し）はこのcanvasを使い回す）。
  async function buildMaskedCanvases() {
    const items = [];
    for (const f of maskFiles) {
      if (!f.pages) continue;
      for (let idx = 0; idx < f.pages.length; idx++) {
        let canvas = f.pages[idx].cleanCanvas;
        if (!canvas) canvas = await renderMaskPdfPageCanvas(f.id, idx);
        if (!canvas) continue;
        const masked = exportMaskedCanvas(canvas, f.pages[idx].regions || []);
        const name = f.pages.length > 1 ? `${f.name} p.${idx + 1}` : f.name;
        items.push({ canvas: masked, name });
      }
    }
    return items;
  }

  // quality未指定ならPNG（無劣化）、指定時はJPEGでその画質にエンコードする。
  function encodeMaskedCanvasItems(items, quality) {
    const mediaType = quality == null ? 'image/png' : 'image/jpeg';
    return items.map(it => {
      const dataUrl = quality == null ? it.canvas.toDataURL('image/png') : it.canvas.toDataURL('image/jpeg', quality);
      const base64 = dataUrl.split(',')[1];
      return { id: uid(), name: it.name, kind: 'image', mediaType, base64, dataUrl };
    });
  }

  function totalBase64Bytes(fileArr) {
    return fileArr.reduce((sum, f) => sum + Math.ceil((f.base64 || '').length * 3 / 4), 0);
  }

  // マスキング確定→焼き込み画像化→送信対象filesの差し替え→生成開始、を一気に行う。
  // 原本PDF/画像のbase64はmaskFiles側だけに留まり、ここで作るpngFilesにしか
  // 含まれないマスク済み画像だけがAPIへの送信対象になる。
  // 合計サイズが上限を超える場合は、PNG→JPEG（画質を段階的に下げる）に自動切り替えして
  // 上限内に収め、ユーザーの手を止めずに生成まで進める。
  async function confirmMaskingAndGenerate() {
    if (maskConfirming) return;
    setMaskConfirming(true);
    try {
      const items = await buildMaskedCanvases();
      if (items.length === 0) {
        showToast('マスキング対象のページがありません');
        return;
      }
      const MAX_BYTES = 28 * 1024 * 1024;
      let pngFiles = encodeMaskedCanvasItems(items, null);
      if (totalBase64Bytes(pngFiles) > MAX_BYTES) {
        const qualitySteps = [0.85, 0.7, 0.55, 0.4];
        for (const q of qualitySteps) {
          pngFiles = encodeMaskedCanvasItems(items, q);
          if (totalBase64Bytes(pngFiles) <= MAX_BYTES) break;
        }
        if (totalBase64Bytes(pngFiles) <= MAX_BYTES) {
          showToast('データ量が上限を超えたため、画質を落として自動調整しました');
        }
      }
      setFiles(pngFiles);
      setActiveFileId(pngFiles[0]?.id ?? null);
      setPhase('result');
      if (totalBase64Bytes(pngFiles) > MAX_BYTES) {
        setGenError(`画質を落としても添付ファイルの合計サイズが大きすぎます（約${(totalBase64Bytes(pngFiles) / 1024 / 1024).toFixed(1)}MB、上限目安28MB）。ページ数を減らしてから再度お試しください。`);
        return;
      }
      handleGenerate(pngFiles);
    } finally {
      setMaskConfirming(false);
    }
  }

  // マスク済みの全ページを1つのPDFにまとめてダウンロードする（薬歴生成とは独立の操作）。
  async function exportMaskedPdf() {
    if (maskExporting || maskConfirming) return;
    setMaskExporting(true);
    try {
      const items = await buildMaskedCanvases();
      if (items.length === 0) {
        showToast('書き出せるページがありません');
        return;
      }
      const { jsPDF } = window.jspdf;
      let doc = null;
      for (const it of items) {
        const w = it.canvas.width, h = it.canvas.height;
        const orientation = w >= h ? 'landscape' : 'portrait';
        const imgData = it.canvas.toDataURL('image/png');
        if (!doc) {
          doc = new jsPDF({ orientation, unit: 'px', format: [w, h] });
        } else {
          doc.addPage([w, h], orientation);
        }
        doc.addImage(imgData, 'PNG', 0, 0, w, h);
      }
      const baseName = maskFiles.length <= 1
        ? (maskFiles[0]?.name.replace(/\.[^./\\]+$/, '') || '個人情報マスキング')
        : `${maskFiles[0]?.name.replace(/\.[^./\\]+$/, '')}他${maskFiles.length - 1}件`;
      doc.save(`${baseName}_個人情報削除済み.pdf`);
      showToast('PDFをダウンロードしました');
    } catch (e) {
      console.error('PDF出力に失敗', e);
      showToast('PDF出力に失敗しました: ' + e.message);
    } finally {
      setMaskExporting(false);
    }
  }

  function setApiKey(v) {
    const cleaned = v.replace(/[^\x21-\x7E]/g, '');
    setApiKeyState(cleaned);
    try { localStorage.setItem(LS_API_KEY, cleaned); } catch (e) {}
  }

  function showToast(msg) {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2200);
  }

  function updateKnowledgeDB(newDB) {
    setKnowledgeDB(newDB);
    saveKnowledgeDBToStorage(newDB);
  }

  async function handleGenerate(filesOverride) {
    const targetFiles = filesOverride || files;
    setGenError(null);
    if (!apiKey.trim()) { setGenError('Claude APIキーを入力してください（右上「設定」）。'); setShowSettings(true); return; }
    if (targetFiles.length === 0) { setGenError('PDFまたは画像をアップロードしてください。'); return; }
    const totalBytes = targetFiles.reduce((sum, f) => sum + Math.ceil((f.base64 || '').length * 3 / 4), 0);
    const MAX_BYTES = 28 * 1024 * 1024;
    if (totalBytes > MAX_BYTES) {
      setGenError(`添付ファイルの合計サイズが大きすぎます（約${(totalBytes / 1024 / 1024).toFixed(1)}MB、上限目安28MB）。PDFを分割してページ数を減らすか、スキャン画像の解像度・圧縮率を下げてから再度お試しください。`);
      return;
    }
    if (result && !confirm('既に生成結果があります。再生成すると現在の編集内容は上書きされます。続けますか？')) return;

    setIsGenerating(true);
    setStreamingText('');
    try {
      const systemPrompt = buildSystemPrompt(knowledgeDB);
      const raw = await callClaude(apiKey.trim(), systemPrompt, targetFiles, setStreamingText);
      const parsed = parseResponse(raw);
      applyParsedResult(parsed);
    } catch (e) {
      setGenError('生成に失敗しました：' + e.message);
    } finally {
      setIsGenerating(false);
      setStreamingText('');
    }
  }

  function applyParsedResult(parsed) {
    setResult(parsed);
    setKnowledgeSuggestions(parsed.knowledgeSuggestions || []);

    if (parsed.parseFailed) {
      setSText(''); setOText(''); setEpText(''); setARawText(''); setAManualText(null);
      setOpProblems([]); setVisitText(''); setOpioidAlert(null); setAutoFixSummary({});
      return;
    }

    setSText(parsed.sText);
    setOText(parsed.oText);
    setEpText(parsed.epText);
    setARawText(parsed.aRawText);
    setAManualText(null);

    const { problems, visitText: vt } = splitOPProblems(parsed.opText);
    setVisitText(vt);

    const opioidDetected = detectOpioidInText(parsed.oText);
    const hasOpioidBlock = problems.some(p => p.isOpioidMandatory);
    let alert = null;
    let finalProblems = problems;
    if (opioidDetected && !hasOpioidBlock) {
      finalProblems = [{ id: uid(), title: OPIOID_TEMPLATE_TITLE, bodyLines: OPIOID_TEMPLATE_BODY, checked: true, isOpioidMandatory: true }, ...problems];
      alert = { type: 'inserted' };
    } else if (!opioidDetected && hasOpioidBlock) {
      alert = { type: 'unexpected' };
    }
    setOpProblems(finalProblems);
    setOpioidAlert(alert);

    const fixes = {};
    ['sText', 'oText', 'epText'].forEach(() => {});
    const checkFix = (label, txt) => {
      const notes = [];
      if (/\n\n/.test(txt)) notes.push('空行を除去しました');
      if (/[（(]\s*[LH]\s*[）)]/.test(txt)) notes.push('（L）（H）表記を除去しました');
      if (/(19|20)\d{2}[年\/\-]/.test(txt)) notes.push('西暦を元号表記に変換しました');
      return notes.length ? notes.join('／') : null;
    };
    fixes.O = checkFix('O', parsed.oText);
    fixes.A = checkFix('A', parsed.aRawText);
    fixes.EP = checkFix('EP', parsed.epText);
    setAutoFixSummary(fixes);
  }

  function setFallbackText(v) {
    setResult(prev => ({ ...prev, rawText: v }));
  }

  const excludedCount = opProblems.filter(p => !p.checked && !p.isOpioidMandatory).length;

  function buildFinalFullText() {
    const opFinal = buildOPText(opProblems, visitText);
    const aFinal = aManualText !== null ? aManualText : computeAutoAText(aRawText, opProblems);
    const parts = [
      ['S', sText], ['O', oText], ['A', aFinal], ['EP', epText], ['OP', opFinal]
    ].map(([k, v]) => `##${k}##\n${finalizeBlockText(v)}`);
    return parts.join('\n\n\n');
  }

  function buildBlockText(key) {
    if (key === 'OP') return `##OP##\n${finalizeBlockText(buildOPText(opProblems, visitText))}`;
    if (key === 'A') return `##A##\n${finalizeBlockText(aManualText !== null ? aManualText : computeAutoAText(aRawText, opProblems))}`;
    const map = { S: sText, O: oText, EP: epText };
    return `##${key}##\n${finalizeBlockText(map[key])}`;
  }

  async function handleCopy(target) {
    if (result && result.parseFailed) {
      const t = convertEraInText(removeLHMarkers(result.rawText));
      await navigator.clipboard.writeText(t);
      showToast('コピーしました');
      return;
    }
    const text = target === 'ALL' ? buildFinalFullText() : buildBlockText(target);
    try {
      await navigator.clipboard.writeText(text);
      showToast(target === 'ALL' ? '全文をコピーしました' : `${target}をコピーしました`);
    } catch (e) {
      showToast('コピーに失敗しました');
    }
  }

  function addKnowledgeSuggestion(item) {
    updateKnowledgeDB([...knowledgeDB, { id: uid(), ...item, addedAt: new Date().toISOString() }]);
    setKnowledgeSuggestions(prev => prev.filter(s => s !== `[${item.category}] [${item.drug}]：${item.content}`));
    showToast('ナレッジに追加しました');
  }
  function skipKnowledgeSuggestion(idx) {
    setKnowledgeSuggestions(prev => prev.filter((_, i) => i !== idx));
  }

  const settingsStatus = apiKey ? 'APIキー ✅' : 'APIキー ❌';

  return (
    <div className="app-root">
      <nav className="nav">
        <span className="nav-title">📋 初回薬歴作成支援</span>
        <div className="flex-c gap-8">
          <span className="text-xs text-p2">{settingsStatus}</span>
          {phase === 'result' && (
            <button className="icon-btn" title="資料を修正" onClick={() => setPhase('mask')}>📄</button>
          )}
          {phase === 'mask' && files.length > 0 && (
            <button className="icon-btn" title="生成結果に戻る" onClick={() => setPhase('result')}>🧾</button>
          )}
          <button className="icon-btn" title="ナレッジ管理" onClick={() => setShowKnowledgePanel(true)}>🧠</button>
          <button className="icon-btn" title="設定" onClick={() => setShowSettings(s => !s)}>⚙️</button>
        </div>
      </nav>

      <div className="content">
        {showSettings && <div className="mt-12"><SettingsPanel apiKey={apiKey} setApiKey={setApiKey} /></div>}

        <div className="mt-12">
          <ConfirmAlertZone items={result && !result.parseFailed ? result.confirmItems : []} />
          <OpioidAlertBanner alert={opioidAlert} onDismiss={() => setOpioidAlert(null)} />
          {genError && <div className="err">⚠️ {genError}</div>}
        </div>

        {phase === 'mask' && (
          <div className="mask-phase">
            <div className="notice">
              PDF・画像はこの端末のブラウザ内だけで処理されます。外部には一切送信されません。
            </div>

            <div className="card" style={{ padding: 12 }}>
              <div className={`dropzone ${maskDragOver ? 'over' : ''}`}
                onClick={() => maskInputRef.current && maskInputRef.current.click()}
                onDragOver={e => { e.preventDefault(); setMaskDragOver(true); }}
                onDragLeave={() => setMaskDragOver(false)}
                onDrop={e => { e.preventDefault(); setMaskDragOver(false); handleMaskFileList(e.dataTransfer.files); }}>
                <div className="dz-icon">📄</div>
                <div className="dz-title">PDF・画像をドラッグ＆ドロップ</div>
                <div className="dz-sub">またはクリックして選択（複数可）</div>
              </div>
              <input ref={maskInputRef} type="file" accept="application/pdf,image/*" multiple style={{ display: 'none' }}
                onChange={e => { handleMaskFileList(e.target.files); e.target.value = ''; }} />

              {maskFiles.length > 0 && (
                <div className="file-tabs">
                  {maskFiles.map(f => (
                    <div key={f.id} className={`file-tab ${maskActiveFileId === f.id ? 'sel' : ''}`} onClick={() => selectMaskFile(f.id)}>
                      <span className="name">{f.kind === 'pdf' ? '📄' : '🖼️'} {f.name}</span>
                      <span className="rm" onClick={e => removeMaskFile(f.id, e)}>✕</span>
                    </div>
                  ))}
                </div>
              )}

              {maskFiles.length > 0 && !maskBulkProgress && (
                <div className="detect-bar">
                  <button className="btn btn-primary btn-sm" onClick={detectAllMaskFiles}>
                    🔍 全ページの個人情報を一括検出
                  </button>
                  <span className="text-xs text-p2">アップロードした全ファイル・全ページをまとめて解析します</span>
                </div>
              )}

              {maskBulkProgress && (
                <div className="prog-wrap" style={{ marginTop: 10, marginBottom: 0 }}>
                  <div className="prog-text">
                    <span>解析中...（{maskBulkProgress.done}/{maskBulkProgress.total}ページ）</span>
                    <strong>{Math.round((maskBulkProgress.done + maskBulkProgress.pageFrac) / maskBulkProgress.total * 100)}%</strong>
                  </div>
                  <div className="prog-bar">
                    <div className="prog-fill" style={{ width: ((maskBulkProgress.done + maskBulkProgress.pageFrac) / maskBulkProgress.total * 100) + '%' }}></div>
                  </div>
                </div>
              )}

              {maskFiles.length > 0 && !maskBulkProgress && (
                <div className="text-xs text-p2" style={{ marginTop: 8, textAlign: 'center' }}>
                  ※初回検出時のみ日本語認識モデル（約15MB）のダウンロードが発生します（以降はオフラインで動作します）
                </div>
              )}
            </div>

            {maskActiveFile && maskActiveFile.pages && maskActiveFile.pages.some(p => p.ocrData) && (
              <div className="card" style={{ padding: 12 }}>
                <div className="debug-toggle-row" style={{ marginTop: 0 }}>
                  <label className="sw">
                    <input type="checkbox" checked={showDebugWords} onChange={e => setShowDebugWords(e.target.checked)} />
                    <div className="sw-track"></div>
                    <div className="sw-thumb"></div>
                  </label>
                  <span className="text-xs text-p2">認識した文字の枠を表示（デバッグ用・全ページ共通）</span>
                </div>
              </div>
            )}

            {maskActiveFile && maskActiveFile.pages && maskActiveFile.pages.length > 0 && (
              <>
                {maskActiveFile.pages.map((page, idx) => (
                  <div key={idx} className="page-card">
                    <div className="page-head">
                      <span className="text-sm text-p2">ページ {idx + 1} / {maskActiveFile.pages.length}</span>
                      <button className="btn btn-danger btn-sm" onClick={() => deleteMaskPage(maskActiveFile.id, idx)}>🗑 このページを削除</button>
                    </div>
                    {page.cleanCanvas ? (
                      <PageEditor page={page} onRegionsChange={regions => updateMaskPageRegions(idx, regions)} debugWords={computeDebugWords(page)} />
                    ) : (
                      <div className="text-p2 text-sm" style={{ padding: '40px 0' }}>ページを読み込み中...</div>
                    )}
                    <RegionListPanel
                      regions={page.regions}
                      onToggle={id => updateMaskPageRegions(idx, page.regions.map(r => r.id === id ? { ...r, enabled: !r.enabled } : r))}
                      onDelete={id => updateMaskPageRegions(idx, page.regions.filter(r => r.id !== id))}
                    />
                  </div>
                ))}

                <div className="export-bar">
                  <button className="btn btn-secondary" onClick={exportMaskedPdf} disabled={maskExporting || maskConfirming || !!maskBulkProgress}>
                    {maskExporting ? '書き出し中...' : '📄 PDFでダウンロード'}
                  </button>
                  <button className="btn btn-primary" onClick={confirmMaskingAndGenerate} disabled={maskConfirming || !!maskBulkProgress}>
                    {maskConfirming ? '処理中...' : '✅ マスキングを確定して薬歴を作成'}
                  </button>
                </div>
              </>
            )}

            {maskActiveFile && maskActiveFile.pages && maskActiveFile.pages.length === 0 && (
              <div className="card empty">
                <div className="empty-icon">📄</div>
                このファイルにはページがありません。別のファイルを選ぶか、ファイル自体を削除してください。
              </div>
            )}

            {maskFiles.length === 0 && (
              <div className="empty">
                <div className="empty-icon">🔒</div>
                PDFまたは画像をアップロードすると、ここに表示されます
              </div>
            )}
          </div>
        )}

        {phase === 'result' && (
          <>
            <div className="card" style={{ padding: 14 }}>
              <button className="btn btn-primary btn-full" onClick={() => handleGenerate()} disabled={isGenerating}>
                {isGenerating ? <span className="flex-c gap-8" style={{ justifyContent: 'center' }}><span className="spin"></span> 生成中…</span> : '▶ 薬歴を生成'}
              </button>
              {isGenerating && streamingText && (
                <div className="text-xs" style={{ marginTop: 10, maxHeight: 200, overflowY: 'auto', whiteSpace: 'pre-wrap', color: 'var(--p2)' }}>
                  {streamingText}
                </div>
              )}
            </div>

            <div className="mobile-tabs">
              <button className={`mobile-tab-btn ${mobileTab === 'source' ? 'sel' : ''}`} onClick={() => setMobileTab('source')}>📄 資料</button>
              <button className={`mobile-tab-btn ${mobileTab === 'preview' ? 'sel' : ''}`} onClick={() => setMobileTab('preview')}>📝 薬歴</button>
            </div>

            <div className={`main-layout tab-${mobileTab}`}>
              <SourcePane files={files} setFiles={setFiles} collapsed={sourceCollapsed} setCollapsed={setSourceCollapsed}
                activeFileId={activeFileId} setActiveFileId={setActiveFileId} />
              <div className="preview-pane">
                <PreviewPane
                  result={result}
                  sText={sText} setSText={setSText}
                  oText={oText} setOText={setOText}
                  epText={epText} setEpText={setEpText}
                  aRawText={aRawText} aManualText={aManualText} setAManualText={setAManualText}
                  opProblems={opProblems} setOpProblems={setOpProblems}
                  visitText={visitText} setVisitText={setVisitText}
                  autoFixSummary={autoFixSummary}
                  setFallbackText={setFallbackText}
                />
                <KnowledgeSuggestionCard suggestions={knowledgeSuggestions} onAdd={addKnowledgeSuggestion} onSkip={skipKnowledgeSuggestion} />
              </div>
            </div>
          </>
        )}
      </div>

      <CopyBar result={result} opProblems={opProblems} excludedCount={excludedCount} onCopy={handleCopy} />

      {showKnowledgePanel && (
        <KnowledgeManagerModal db={knowledgeDB} onClose={() => setShowKnowledgePanel(false)} onUpdate={updateKnowledgeDB} />
      )}

      {maskConfirmDialog && (
        <div className="modal-overlay" onClick={() => setMaskConfirmDialog(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-msg">{maskConfirmDialog.message}</div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setMaskConfirmDialog(null)}>キャンセル</button>
              <button className="btn btn-primary" style={{ background: 'var(--red)', boxShadow: 'none' }}
                onClick={maskConfirmDialog.onConfirm}>削除する</button>
            </div>
          </div>
        </div>
      )}

      <Toast message={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function () {
  const src = document.getElementById('app-source').textContent;
  const out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
  const s = document.createElement('script');
  s.text = out;
  document.body.appendChild(s);
})();
</script>
</body>
</html>
